<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKMS - Multi-Agent RAG</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --accent: #0f172a;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #334155;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        h1 {
            color: var(--accent);
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .search-box {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            display: flex;
            gap: 1rem;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:disabled {
            background-color: var(--secondary);
            cursor: not-allowed;
        }

        .result-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid var(--border);
        }

        .card h3 {
            margin-top: 0;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        .markdown-body {
            line-height: 1.6;
        }

        .hidden {
            display: none;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        pre {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
        }

        .citation-tag {
            color: var(--primary);
            font-weight: bold;
            cursor: pointer;
            position: relative;
            background: #e0f2fe;
            padding: 0 4px;
            border-radius: 4px;
            margin: 0 2px;
        }

        .citation-tag:hover {
            text-decoration: underline;
            background: #bae6fd;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>IKMS AI Assistant</h1>
            <p style="text-align: center; color: var(--secondary);">Agentic RAG Assistant (Conversational Memory)</p>
        </header>

        <div class="chat-history" id="chatHistory" style="display: flex; flex-direction: column; gap: 2rem;">
            <!-- Chat items will be appended here -->
            <div class="welcome-message" style="text-align: center; color: var(--secondary); padding: 2rem;">
                <p>👋 <strong>Welcome to IKMS Conversational Agent</strong></p>
                <p>I remember our conversation and can answer follow-up questions.</p>
                <p>Ask me anything about vector databases!</p>
            </div>
        </div>

        <div class="search-box" style="position: sticky; bottom: 2rem; z-index: 10;">
            <input type="text" id="questionInput" placeholder="Ask a question (e.g., 'What is HNSW?')">
            <button id="askBtn" onclick="askQuestion()">Ask AI</button>
        </div>

        <!-- Templates (hidden) -->
        <template id="messageTemplate">
            <div class="chat-message" style="display: flex; flex-direction: column; gap: 1rem;">
                <div class="user-turn"
                    style="align-self: flex-end; background: var(--primary); color: white; padding: 1rem; border-radius: 1rem 1rem 0 1rem; max-width: 80%;">
                    <strong>You:</strong> <span class="q-text"></span>
                </div>
                <div class="ai-turn"
                    style="align-self: flex-start; background: white; padding: 1.5rem; border-radius: 1rem 1rem 1rem 0; width: 100%; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
                    <div class="ai-header"
                        style="margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; color: var(--accent); font-weight: bold;">
                        🤖 Assistant
                    </div>

                    <div class="answer-section markdown-body" style="margin-bottom: 1.5rem;"></div>

                    <div class="details-accordion">
                        <details>
                            <summary style="cursor: pointer; color: var(--primary); font-weight: 600;">Show Context
                            </summary>
                            <div class="details-content"
                                style="margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--border);">

                                <div class="raw-context-section hidden">
                                    <h4>📄 Referenced Context</h4>
                                    <pre class="context-content"
                                        style="font-size: 0.8em; max-height: 200px; overflow: auto;"></pre>
                                </div>
                            </div>
                        </details>
                    </div>
                </div>
            </div>
        </template>

        <!-- HIDDEN: Old Results Container (replaced by Chat History) -->
        <div id="results" class="result-section hidden"></div>
    </div>

    <script>
        // Generate or retrieve Session ID
        let sessionId = localStorage.getItem('ikms_session_id');
        if (!sessionId) {
            sessionId = 'sess_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('ikms_session_id', sessionId);
        }

        console.log("Current Session:", sessionId);

        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const btn = document.getElementById('askBtn');
            const historyContainer = document.getElementById('chatHistory');
            const template = document.getElementById('messageTemplate');

            const question = input.value.trim();
            if (!question) return;

            // Disable Input
            input.value = '';
            btn.disabled = true;
            btn.textContent = 'Thinking...';

            // 1. Render User Message immediately (Optimistic UI) (Actually done via template clone below)
            const clone = template.content.cloneNode(true);
            const msgDiv = clone.querySelector('.chat-message');
            msgDiv.querySelector('.q-text').textContent = question;

            // Prepare AI turn slots
            const aiTurn = msgDiv.querySelector('.ai-turn');
            const answerDiv = msgDiv.querySelector('.answer-section');

            // Append to history
            historyContainer.appendChild(msgDiv);
            window.scrollTo(0, document.body.scrollHeight);

            try {
                // Call API with Session ID
                const response = await fetch(`/qa?session_id=${sessionId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();

                // 2. Update AI Response

                // Answer
                const answerText = data.answer || "I couldn't generate an answer.";
                answerDiv.innerHTML = answerText.replace(/\n/g, '<br>');

                // Full Context
                if (data.context) {
                    aiTurn.querySelector('.raw-context-section').classList.remove('hidden');
                    aiTurn.querySelector('.context-content').textContent = data.context;
                }

            } catch (err) {
                answerDiv.textContent = 'Error: ' + err.message;
                answerDiv.style.color = 'red';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Ask AI';
                window.scrollTo(0, document.body.scrollHeight);
            }
        }

        // Allow Enter key to submit
        document.getElementById('questionInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') askQuestion();
        });
    </script>
</body>

</html>
